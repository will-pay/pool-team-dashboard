<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Team Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎱 Sticks & Stoned Dashboard</h1>
        </header>

        <!-- Loading Indicator -->
        <div id="loading-indicator" style="display: none; text-align: center; padding: 20px; font-size: 16px; color: #666;">
            Loading data...
        </div>

        <nav class="tabs">
            <button class="tab-button active" data-tab="schedule">Schedule</button>
            <button class="tab-button" data-tab="my-team">Roster</button>
            <button class="tab-button" data-tab="other-teams">Other Teams</button>
        </nav>

        <!-- Schedule Tab -->
        <div id="schedule" class="tab-content active">
            <div class="section">
                <h3>Upcoming Matches</h3>
                <div id="schedule-cards"></div>
            </div>
            <div class="section">
                <h3>Add Match</h3>
                <form id="schedule-form">
                    <div class="date-inputs">
                        <input type="number" id="match-month" placeholder="MM" min="1" max="12" required>
                        <input type="number" id="match-day" placeholder="DD" min="1" max="31" required>
                    </div>
                    <div class="autocomplete-wrapper">
                        <input type="text" id="opponent" placeholder="Opponent Team" autocomplete="off" required>
                        <div id="opponent-dropdown" class="autocomplete-dropdown"></div>
                    </div>
                    <input type="text" id="location" placeholder="Location" required>
                    <button type="submit">Add Match</button>
                </form>
            </div>
        </div>

        <!-- My Team Tab -->
        <div id="my-team" class="tab-content">
            <div class="section">
                <h3>Team Roster & Rankings</h3>
                <table id="players-table">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="name">Name</th>
                            <th class="sortable" data-sort="skillLevel">SL</th>
                            <th class="sortable" data-sort="wins">W</th>
                            <th class="sortable" data-sort="losses">L</th>
                            <th class="sortable" data-sort="winPct">Win %</th>
                            <th class="sortable" data-sort="avgPPM">Avg PPM</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="players-body">
                    </tbody>
                </table>
            </div>
            <div class="section">
                <h3>Add Player Manually</h3>
                <form id="player-form">
                    <input type="text" id="player-name" placeholder="Player Name" required>
                    <input type="number" id="skill-level" placeholder="Skill Level (2-8)" min="2" max="8" step="1" required>
                    <input type="number" id="player-wins" placeholder="Wins" min="0" required>
                    <input type="number" id="player-losses" placeholder="Losses" min="0" required>
                    <input type="number" id="avg-ppm" placeholder="Average PPM (0-2)" min="0" max="2" step="0.01" required>
                    <button type="submit">Add Player</button>
                </form>
            </div>
        </div>

        <!-- Other Teams Tab -->
        <div id="other-teams" class="tab-content">
            <div class="section">
                <h3>League Standings</h3>
                <table id="teams-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Team Name</th>
                            <th>Total Points</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="teams-body">
                    </tbody>
                </table>
            </div>
            <div class="section">
                <h3>Add/Update Team</h3>
                <form id="team-form">
                    <input type="text" id="team-name" placeholder="Team Name" required>
                    <input type="number" id="team-points" placeholder="Total Points" min="0" required>
                    <button type="submit">Add Team</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Google Sheets Sync Module -->
    <script src="google-sheets-sync.js"></script>

    <!-- Application Script -->
    <script src="script.js"></script>
</body>
</html>
